data:
  start_date: "2019-01-01"
  # end_date is read dynamically as today in run_etl.py - this value is a fallback only
  end_date: "today"

portfolio:
  initial_capital: 1_000_000
  round_lot: 1

universe:
  - NSE:TCS
  - NSE:INFY
  - NSE:RELIANCE
  - NSE:HDFCBANK
  - NSE:ICICIBANK
  - NSE:SBIN
  - NSE:AXISBANK
  - NSE:LT
  - NSE:ITC
  - NSE:HINDUNILVR
  - NSE:MARUTI
  - NSE:BAJFINANCE
  - NSE:ASIANPAINT
  - NSE:WIPRO
  - NSE:TITAN
  - NSE:ULTRACEMCO
  - NSE:POWERGRID
  - NSE:NTPC
  - NSE:ADANIENT
  - NSE:ADANIPORTS

model:
  target_horizon_days: 5
  target_threshold: 0.02
  train_window_days: 252
  step_days: 21
  min_train_rows: 120

  ensemble_weights:
    xgb: 0.50
    rf:  0.30
    lr:  0.20

  signal:
    top_n: 5        # long top 5 ranked stocks each day
    bottom_n: 0     # 0 = long-only mode (no shorts)

backtest:
  fees_bps: 10
  slippage_bps: 5

risk:
  stop_loss_pct: 0.07
  max_weight_per_stock: 0.20
  portfolio_optimizer: "erc"
  volatility_target_annual: 0.15
  volatility_lookback_days: 20

api:
  api_key: "changeme"

logging:
  level: "INFO"
  file: "logs/system.log"